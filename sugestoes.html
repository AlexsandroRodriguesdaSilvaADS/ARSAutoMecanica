<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Sugestões Identificadas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }

        h2 { margin-top: 0; color: #2c3e50; text-align: center; }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #d1d8e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea { height: 80px; resize: none; }

        .botoes { display: flex; gap: 10px; }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-enviar { background-color: #27ae60; color: white; }
        .btn-enviar:hover { background-color: #219150; }

        .btn-limpar { background-color: #95a5a6; color: white; }
        .btn-limpar:hover { background-color: #7f8c8d; }

        #listaSugestoes {
            width: 100%;
            max-width: 500px;
        }

        .sugestao-card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 6px solid #27ae60;
            animation: slideIn 0.4s ease-out;
        }

        .sugestao-nome {
            font-weight: bold;
            color: #27ae60;
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .sugestao-texto {
            line-height: 1.5;
            color: #4b6584;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Feedback & Sugestões</h2>
        
        <input type="text" id="nomeUsuario" placeholder="Seu nome ou apelido">
        <textarea id="textoSugestao" placeholder="No que podemos melhorar?"></textarea>
        
        <div class="botoes">
            <button class="btn-enviar" onclick="adicionarSugestao()">Publicar Sugestão</button>
            <button class="btn-limpar" onclick="limparHistorico()">Limpar Tudo</button>
        </div>
    </div>

    <div id="listaSugestoes">
    </div>

    <script>
        // Carrega os dados ao abrir a página
        document.addEventListener('DOMContentLoaded', carregarSugestoes);

        function adicionarSugestao() {
            const nomeInput = document.getElementById('nomeUsuario');
            const textoInput = document.getElementById('textoSugestao');
            
            const nome = nomeInput.value.trim();
            const texto = textoInput.value.trim();

            if (nome === "" || texto === "") {
                alert("Por favor, preencha o seu nome e a sugestão.");
                return;
            }

            const novaSugestao = {
                autor: nome,
                conteudo: texto,
                data: new Date().toLocaleDateString('pt-BR')
            };

            // 1. Salvar no LocalStorage
            salvarSugestao(novaSugestao);

            // 2. Exibir na tela
            renderizarSugestao(novaSugestao);

            // 3. Limpar campos
            nomeInput.value = "";
            textoInput.value = "";
        }

        function renderizarSugestao(sugestao) {
            const lista = document.getElementById('listaSugestoes');
            
            const card = document.createElement('div');
            card.className = 'sugestao-card';
            
            card.innerHTML = `
                <span class="sugestao-nome">${sugestao.autor} disse:</span>
                <div class="sugestao-texto">${sugestao.conteudo}</div>
            `;

            // Adiciona sempre no topo
            lista.insertBefore(card, lista.firstChild);
        }

        function salvarSugestao(sugestao) {
            let banco = JSON.parse(localStorage.getItem('muralDados') || "[]");
            banco.push(sugestao);
            localStorage.setItem('muralDados', JSON.stringify(banco));
        }

        function carregarSugestoes() {
            let banco = JSON.parse(localStorage.getItem('muralDados') || "[]");
            // Renderiza cada item do banco
            banco.forEach(item => renderizarSugestao(item));
        }

        function limparHistorico() {
            if (confirm("Tem certeza que deseja apagar todas as sugestões?")) {
                localStorage.removeItem('muralDados');
                document.getElementById('listaSugestoes').innerHTML = "";
            }
        }
    </script>

</body>
</html>
