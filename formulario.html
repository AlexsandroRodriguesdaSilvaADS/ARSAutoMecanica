  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.14.0/devicon.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"

  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/formulario.css">
  <link rel="stylesheet" href="./src/css/responsivo.css">
  <link rel="stylesheet" href="./src/css/estilos.css">
</head>

<body cz-shortcut-listen="true">
  <div class="main">
    <header class="cabecalho">
      <a href="./index.html" target="_self">
        <img class="logo" src="./src/imagens/avatar.png" title="Soluções integradas para o seu veículo"
        alt="Logo de ARS Mecânico Automotivo">
      </a>
      <nav class="menu">
        <ul>
          <li>
            <a>Formulário para Agendamento</a>
          </li>
        </ul>
      </nav>
    </header>
    
 <div class="form-content">
    <section id="section-form" class="container">
        <div class="form-content">
        <h3>Realize o seu agendamento aqui</h3>
       
        <div class="form-container">
          <form>
            <label for="name">Nome Completo</label>
            <input type="text" name="name" id="txtName">

            <label for="email">E-mail</label>
            <input type="email" name="email" id="txtEmail">

            <label for="contato">Telefone para Contato</label>
            <input type="text" name="contato" id="txtContato">

            <label for="data">Data</label>
            <input type="date" name="date" id="txtDate">

            <label for="character">Observações</label>
            <textarea name="character" cols="30" rows="5" id="txtCharacter" placeholder="Exemplo: Problema na embreagem: sem força, deslizando"></textarea>
            
          </form>

          <button type="button" id="btnSubscribe">Enviar</button>

        </div>
      </div>
    </section>

    <section class="home">
      <form action=""></form>
    </section>

  </div>

  <footer class="footer">
    <h2>Alexsandro Rodrigues da Silva | ADS</h2>
    <h1>© Copyright 2026. Made by <a href="" target="_blank">Alexsandro R da Silva</a></h1>
  </footer>
    
</body>
</html>
